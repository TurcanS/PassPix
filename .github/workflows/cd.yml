name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            packages: build-essential libssl-dev libsodium-dev
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.target == 'windows' && 'msys2 {0}' || 'bash' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - uses: msys2/setup-msys2@v2
        if: matrix.target == 'windows'
        with:
          msystem: ucrt64
          update: true
          install: >-
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-libsodium

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passpix-${{ matrix.target }}
          path: passpix*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: passpix-linux
          path: release/linux/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: passpix-windows
          path: release/windows/

      - name: Organize and hash
        run: |
          mkdir -p dist
          ls -R release/
          cp release/linux/passpix dist/passpix-linux
          WINFILE=$(find release/windows -type f -not -name "*.md" | head -1)
          cp "$WINFILE" dist/passpix.exe
          ls -la dist/
          echo "LINUX_HASH=$(sha256sum dist/passpix-linux | awk '{print $1}')" >> $GITHUB_ENV
          echo "WIN_HASH=$(sha256sum dist/passpix.exe | awk '{print $1}')" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Hashes (SHA-256)

            | Platform | Binary | Hash |
            |---|---|---|
            | Linux | `passpix` | `${{ env.LINUX_HASH }}` |
            | Windows | `passpix.exe` | `${{ env.WIN_HASH }}` |
          files: |
            dist/passpix-linux
            dist/passpix.exe
